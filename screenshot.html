<!DOCTYPE html>
<html>
<head>
    <title>Trial Screenshots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 17px;
            line-height: 1.7;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fff;
        }

        /* Toggle bar */
        .toggle-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 100;
            font-size: 15px;
        }

        .toggle-bar label {
            font-weight: 600;
            color: #555;
        }

        .toggle-bar select {
            font-family: inherit;
            font-size: 15px;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }

        .toggle-bar .trial-nav button {
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 18px;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-left: 8px;
        }

        .toggle-bar .trial-nav button:hover {
            background-color: #2980b9;
        }

        .toggle-bar .trial-nav button.active {
            background-color: #1f6da3;
        }

        /* Trial display */
        .trial-wrapper {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            width: 100%;
        }

        .trial-container {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .trial-image {
            max-width: 600px;
            max-height: 350px;
            margin-bottom: 8px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .trial-container p {
            font-size: 18px;
            margin-top: 12px;
        }

        /* Slider */
        .slider-container {
            margin-top: 20px;
            width: 500px;
        }

        .slider-container input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #dcdcdc;
            border-radius: 4px;
            outline: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #3498db;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: #3498db;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 14px;
            color: #555;
        }

        /* Continue button */
        .continue-btn {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 10px 30px;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }

        .continue-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="toggle-bar">
        <label>Condition:</label>
        <select id="condition-select">
            <option value="diff">Difficulty</option>
            <option value="time">Time</option>
        </select>
        <div class="trial-nav">
            <button id="btn-initial" class="active" onclick="showTrial('initial')">Example Initial</button>
            <button id="btn-final" onclick="showTrial('final')">Example Final</button>
        </div>
    </div>

    <div class="trial-wrapper">
        <div class="trial-container">
            <img id="trial-img" class="trial-image" src="stim_files/Example_Initial.jpg">
            <p id="trial-question"></p>
            <div class="slider-container">
                <input type="range" min="0" max="100" value="50">
                <div class="slider-labels">
                    <span id="label-left"></span>
                    <span id="label-right"></span>
                </div>
            </div>
            <button class="continue-btn">Continue</button>
        </div>
    </div>

    <script>
        const conditionConfig = {
            diff: {
                trialQuestion: 'How <b>difficult</b> would it be to build this structure?',
                sliderLabels: ['easy', 'difficult'],
            },
            time: {
                trialQuestion: 'How <b>long</b> would it take to build this structure?',
                sliderLabels: ['0 seconds', '100 seconds'],
            }
        };

        const images = {
            initial: 'stim_files/Example_Initial.jpg',
            final: 'stim_files/Example_Final.jpg',
        };

        let currentTrial = 'initial';

        function update() {
            const cond = document.getElementById('condition-select').value;
            const config = conditionConfig[cond];
            document.getElementById('trial-question').innerHTML = config.trialQuestion;
            document.getElementById('label-left').textContent = config.sliderLabels[0];
            document.getElementById('label-right').textContent = config.sliderLabels[1];
            document.getElementById('trial-img').src = images[currentTrial];
        }

        function showTrial(trial) {
            currentTrial = trial;
            document.getElementById('btn-initial').classList.toggle('active', trial === 'initial');
            document.getElementById('btn-final').classList.toggle('active', trial === 'final');
            update();
        }

        document.getElementById('condition-select').addEventListener('change', update);
        update();
    </script>
</body>
</html>
